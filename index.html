<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Jonas sitt Sverd-Salg</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Jonas sine håndlagde sverd</h1>
    <p>Nettside for Jonas (50) som smir sverd i fjellene.</p>
    <hr>

    <div class="sverd-liste">
        
        <div class="sverd">
            <h3>BlackFyre</h3>
            <p>Pris: 15 000 kr</p>
            <button onclick="kjop('BlackFyre')">Kjøp sverd</button>
            <img src="kilder/Blackfyre.webp" width="125" height="125">
        </div>

        <div class="sverd">
            <h3>Darksister</h3>
            <p>Pris: 19 000 kr</p>
            <button onclick="kjop('Darksister')">Kjøp sverd</button>
            <img src="kilder/Darksister.webp" width="125" height="125">
        </div> <div class="sverd">
            <h3>LongClaw</h3>
            <p>Pris: 17 000 kr</p>
            <button onclick="kjop('LongClaw')">Kjøp sverd</button>
            <img src="kilder/longclawjpg.jpg" width="125" height="125">
        </div>
    </div>
    <hr>

    <h2>Handlekurv</h2>
    <p>Antall sverd i kurven: <b id="antall">0</b></p>
    <p>Totalsum: <b id="totalsum">0 kr</b></p>

    <script src="script.js"></script>
</body>
</html>
